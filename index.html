<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #07080c; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { border: 2px solid #00ffcc; background: #1e2235; display: block; margin: 10px auto; }
        .controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center; }
        button { padding: 15px; font-size: 20px; background: #00ffcc; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>SNAKE KILLA 🐍</h1>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <div class="controls">
        <div></div><button onclick="dir='UP'">🔼</button><div></div>
        <button onclick="dir='LEFT'">◀️</button><button onclick="dir='DOWN'">🔽</button><button onclick="dir='RIGHT'">▶️</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let snake = [{x: 10, y: 10}], food = {x: 15, y: 15}, dir = "RIGHT";
        function gameLoop() {
            let head = {x: snake[0].x, y: snake[0].y};
            if(dir === "UP") head.y--; if(dir === "DOWN") head.y++;
            if(dir === "LEFT") head.x--; if(dir === "RIGHT") head.x++;
            if(head.x === food.x && head.y === food.y) { food = {x: Math.floor(Math.random()*15), y: Math.floor(Math.random()*15)}; } else { snake.pop(); }
            snake.unshift(head);
            ctx.fillStyle = "#1e2235"; ctx.fillRect(0,0,300,300);
            ctx.fillStyle = "red"; ctx.fillRect(food.x*20, food.y*20, 18, 18);
            ctx.fillStyle = "#00ffcc";
            snake.forEach(part => ctx.fillRect(part.x*20, part.y*20, 18, 18));
            setTimeout(gameLoop, 150);
        }
        gameLoop();
    </script>
</body>
</html>
